<div class="flex flex-col h-screen">
  <!-- Top Nav Menu -->
  <header class="z-40 drop-shadow-md">
    <app-user-menu (click)="isUserMenuOpen = true" />
  </header>
  <!-- Side Dashboard Menu -->
  <div class="flex flex-1 overflow-hidden">
    <aside class="flex-shrink-0">
      <app-dashboard-side-menu />
    </aside>
    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto bg-gray-100 p-6 space-y-2">
      <div class="mx-auto w-fit">
        <!-- Create Schema Button -->
        <app-create-schema (click)="isCreateSchemaFormOpen = true" />
      </div>
      <!-- Dashboard Main Content -->
      <app-dashboard-main />
    </main>
  </div>
  <!-- User Menu Drawer -->
  <app-user-menu-drawer [isOpen]="isUserMenuOpen" (closeDrawer)="isUserMenuOpen = false" />
  <!-- Create Schema Form -->
  <app-create-schema-form
    [isOpen]="isCreateSchemaFormOpen"
    (closeForm)="isCreateSchemaFormOpen = false"
  />
</div>
