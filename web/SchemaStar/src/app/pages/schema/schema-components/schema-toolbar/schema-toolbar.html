<div (mouseleave)="clearActiveMenu()">
  <div class="drop-shadow-md">
    <!-- Left side logo menus -->
    <div class="flex items-center justify-between w-full gap-2 bg-zinc-50">
      <div class="flex items-center gap-4">
        <!-- Logo -->
        <div class="flex items-center justify-center p-2">
          <i
            class="fa-solid fa-star text-4xl text-medium-purple hover:text-dark-purple hover:cursor-pointer"
          ></i>
        </div>
        <!-- The SchemaName and Global Menu -->
        <div class="flex flex-col">
          <h1 class="text-3xl font-bold text-medium-purple">Schema Name</h1>
          <div class="flex gap-4">
            <button
              class="menu-item"
              (mousenter)="this.schemaUiStateService.setActiveMenuSchemaToolBar('file')"
            >
              File
            </button>
            <button
              class="menu-item"
              (mouseenter)="this.schemaUiStateService.setActiveMenuSchemaToolBar('edit')"
            >
              Edit
            </button>
            <button
              class="menu-item"
              (mouseenter)="this.schemaUiStateService.setActiveMenuSchemaToolBar('view')"
            >
              View
            </button>
            <button
              class="menu-item"
              (mousenter)="this.schemaUiStateService.setActiveMenuSchemaToolBar('help')"
            >
              Help
            </button>
          </div>
        </div>
      </div>
      <!-- Account and Exit Dashboard -->
      <div class="flex justify-items-end px-2">
        <button class="text-sm">
          <i class="fa-solid fa-user text-3xl text-medium-purple hover:text-dark-purple"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- DropDown Menus -->
  @if (schemaUiStateService.activeMenuSchemaToolBar() == 'view') {
    <!-- Template component for Specific Menu Items -->
    <div
      class="absolute z-50 top-20 left-52 w-max bg-gray-100 shadow-md shadow-purple-400 border-2 border-slate-900 rounded-lg"
    >
      <div class="flex flex-col gap-2">
        <button>
          <p class="flex justify-between items-center gap-8">
            <span>Zoom In</span>
            <span>Ctrl + </span>
          </p>
        </button>
        <button>
          <p class="flex justify-between items-center gap-8">
            <span>Zoom Out</span>
            <span>Ctrl - </span>
          </p>
        </button>
      </div>
    </div>
  }
</div>
