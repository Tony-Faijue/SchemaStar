<app-schema-toolbar [container]="flowContainer"></app-schema-toolbar>

<div #flowContainer class="w-full h-screen border-2 border-slate-700 bg-purple-100 p-2 relative">
  <app-schema-quick-toolbar [container]="flowContainer"></app-schema-quick-toolbar>
  <app-node-palette></app-node-palette>
  <!-- Flow Root Container -->
  <f-flow
    fDraggable
    class="h-full w-full relative"
    (fMoveNodes)="flowStateService.handlesNodesMovement($event)"
    (fCreateConnection)="onCreateConnection($event)"
    (fSelectionChange)="flowStateService.handleSelectionChange($event)"
    (fCreateNode)="onCreateNode($event)"
  >
    <!-- Allows Box Selection Area  -->
    <f-selection-area></f-selection-area>
    <!-- Background -->
    <f-background>
      <f-rect-pattern></f-rect-pattern>
    </f-background>

    <f-canvas fZoom (fCanvasChange)="schemaUiStateService.onZoomChange($event)">
      <!-- Allow Creation of Edges/Connections -->
      <f-connection-for-create fBehavior="floating" fType="straight"></f-connection-for-create>
      <!-- Edges/Connections -->
      @for (edge of flowStateService.flowEdges(); track edge.id) {
        <f-connection [fConnectionId]="edge.id" [fOutputId]="edge.source" [fInputId]="edge.target">
        </f-connection>
      }

      <!-- Nodes -->
      @for (node of flowStateService.flowNodes(); track node.id) {
        <div
          fNode
          fDragHandle
          [fNodeId]="node.id"
          [fNodePosition]="node.position"
          class="relative bg-white border-2 border-zinc-900 p-4 rounded shadow-lg cursor-move group/node"
        >
          <!-- Node Name -->
          <div class="font-bold border-b mb-2">{{ node.data.nodeName }}</div>

          <!-- Node Assets -->
          <div class="text-sm space-y-1">
            @for (asset of node.data.NodeAssets; track asset.publicId) {
              <div class="text-blue-600">
                {{ asset.nodeAssetName }}
              </div>
            }
          </div>
          <!-- Connectors (I/O)-->
          <div
            fNodeInput
            [fInputId]="node.id"
            fInputConnectableSide="left"
            class="no-drag absolute left-0 top-0 bottom-0 w-4 h-full flex items-center justify-start z-50 cursor-crosshair"
          >
            <div
              class="w-3 h-3 bg-zinc-800 rounded-full -translate-x-1/2 opacity-0 group-hover/node:opacity-100 transition-opacity duration-150"
            ></div>
          </div>
          <div
            fNodeOutput
            [fOutputId]="node.id"
            fOutputConnectableSide="right"
            class="no-drag absolute right-0 top-0 bottom-0 w-4 h-full flex items-center justify-end z-50 cursor-crosshair"
          >
            <div
              class="w-3 h-3 bg-zinc-800 rounded-full translate-x-1/2 opacity-0 group-hover/node:opacity-100 transition-opacity duration-150"
            ></div>
          </div>
        </div>
      }
    </f-canvas>
  </f-flow>
</div>
